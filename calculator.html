<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculator</title>
  <meta name="description" content="Basic calculator with digit buttons, four operations, equals, and clear. JavaScript calculates immediately." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container header-inner">
     

      <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="theme-icon" aria-hidden="true">🌙</span>
      </button>

      <nav class="nav" aria-label="Primary">
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle navigation">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>

        <div class="nav-menu" id="nav-menu">
          <a class="nav-link" href="index.html">Portfolio</a>
          <a class="nav-link" href="blog.html">Blog</a>
          <a class="nav-link" href="shop.html">Product Gallery</a>
          <a class="nav-link active" href="calculator.html">Calculator</a>
          <a class="nav-link" href="contact.html">Consultation Form</a>
        </div>
      </nav>
    </div>
  </header>

  <main id="main" class="page">
    <section class="page-heading">
      <div class="container">
        <h1>Calculator</h1>
      </div>
    </section>

    <section class="container section">
      <div class="calc-wrap">
        <div class="calc-card" role="region" aria-label="Basic calculator">
          <div class="calc-screen" aria-live="polite">
            <div class="calc-expression" id="calcExpression"></div>
            <div class="calc-value" id="calcDisplay">0</div>
          </div>

          <div class="calc-buttons" role="group" aria-label="Calculator buttons">
            <button class="calc-btn calc-clear" type="button" data-action="clear">C</button>
            <button class="calc-btn" type="button" data-value="/">÷</button>
            <button class="calc-btn" type="button" data-value="*">×</button>
            <button class="calc-btn" type="button" data-value="-">−</button>

            <button class="calc-btn" type="button" data-value="+">+</button>
            <button class="calc-btn" type="button" data-value="7">7</button>
            <button class="calc-btn" type="button" data-value="8">8</button>
            <button class="calc-btn" type="button" data-value="9">9</button>

            <button class="calc-btn" type="button" data-value="4">4</button>
            <button class="calc-btn" type="button" data-value="5">5</button>
            <button class="calc-btn" type="button" data-value="6">6</button>

            <button class="calc-btn" type="button" data-value="1">1</button>
            <button class="calc-btn" type="button" data-value="2">2</button>
            <button class="calc-btn" type="button" data-value="3">3</button>

            <button class="calc-btn calc-zero" type="button" data-value="0">0</button>
            <button class="calc-btn calc-equals" type="button" data-action="equals">=</button>
          </div>
        </div>
      </div>

      <div class="calc-hint">
        <p class="muted">Tap buttons to build an expression. Press <strong>=</strong> to calculate instantly.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
   
  </footer>

  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') document.documentElement.classList.add('theme-dark');

      const btn = document.querySelector('.theme-toggle');
      if (btn) {
        const icon = btn.querySelector('.theme-icon');
        if (icon) icon.textContent = document.documentElement.classList.contains('theme-dark') ? '☀️' : '🌙';

        btn.addEventListener('click', () => {
          const isDark = document.documentElement.classList.toggle('theme-dark');
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
          if (icon) icon.textContent = isDark ? '☀️' : '🌙';
        });
      }

      const display = document.getElementById('calcDisplay');
      const expressionEl = document.getElementById('calcExpression');
      if (!display || !expressionEl) return;

      const buttons = document.querySelectorAll('.calc-btn');

      let currentInput = '0';
      let pendingOperator = null; // '+', '-', '*', '/'
      let previousValue = null;
      let justEvaluated = false;

      function formatNumber(n) {
        if (!Number.isFinite(n)) return 'Error';
        const s = String(n);
        if (s.includes('e')) return s;
        const parts = s.split('.');
        if (parts.length === 1) return s;
        return (parseFloat(n.toFixed(12))).toString();
      }

      function updateUI() {
        display.textContent = currentInput;
        if (pendingOperator && previousValue !== null) {
          const opLabel = pendingOperator === '*' ? '×' : pendingOperator === '/' ? '÷' : pendingOperator;
          expressionEl.textContent = `${previousValue} ${opLabel}`;
        } else {
          expressionEl.textContent = '';
        }
      }

      function normalizeOperator(op) {
        if (op === '+') return '+';
        if (op === '-') return '-';
        if (op === '*') return '*';
        if (op === '/') return '/';
        return op;
      }

      function clearAll() {
        currentInput = '0';
        pendingOperator = null;
        previousValue = null;
        justEvaluated = false;
        expressionEl.textContent = '';
        updateUI();
      }

      function inputDigit(d) {
        if (justEvaluated) {
          currentInput = '0';
          previousValue = null;
          pendingOperator = null;
          expressionEl.textContent = '';
          justEvaluated = false;
        }

        if (currentInput === '0') currentInput = String(d);
        else currentInput += String(d);

        updateUI();
      }

      function compute(a, b, op) {
        if (op === '+') return a + b;
        if (op === '-') return a - b;
        if (op === '*') return a * b;
        if (op === '/') return b === 0 ? NaN : a / b;
        return b;
      }

      function inputOperator(op) {
        const inputNumber = Number(currentInput);

        // If previous was already evaluated, keep currentInput as the last result.
        // Do not treat next digit as continuing the old number.
        if (justEvaluated) {
          justEvaluated = false;
        }

        // If we already have a pending operator, and user presses a new operator,
        // compute the intermediate so the calculator is ready for the next number.
        if (pendingOperator && previousValue !== null) {
          const result = compute(previousValue, inputNumber, pendingOperator);
          previousValue = result;
          currentInput = formatNumber(result);
        } else {
          previousValue = inputNumber;
          currentInput = formatNumber(inputNumber);
        }

        pendingOperator = op;

        // IMPORTANT: next digit should start a new number (not append to currentInput).
        currentInput = '0';
        expressionEl.textContent = '';

        updateUI();
      }


      function equals() {
        if (!pendingOperator || previousValue === null) return;

        const a = previousValue;
        const b = Number(currentInput);
        const result = compute(a, b, pendingOperator);

        if (!Number.isFinite(result)) {
          currentInput = 'Error';
          previousValue = null;
          pendingOperator = null;
          expressionEl.textContent = '';
          justEvaluated = true;
          updateUI();
          return;
        }

        currentInput = formatNumber(result);
        expressionEl.textContent = '';
        previousValue = null;
        pendingOperator = null;
        justEvaluated = true;
        updateUI();
      }

      buttons.forEach((btn) => {
        btn.addEventListener('click', () => {
          const action = btn.getAttribute('data-action');
          const value = btn.getAttribute('data-value');

          if (action === 'clear') return clearAll();
          if (action === 'equals') return equals();

          if (value === '+' || value === '-' || value === '*' || value === '/') {
            return inputOperator(normalizeOperator(value));
          }

          if (/^\d$/.test(value)) return inputDigit(value);
        });
      });

      updateUI();

      // Navbar toggle
      const toggle = document.querySelector('.nav-toggle');
      const menu = document.querySelector('#nav-menu');
      if (toggle && menu) {
        toggle.addEventListener('click', () => {
          const expanded = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', String(!expanded));
          menu.classList.toggle('open');
        });

        menu.addEventListener('click', (e) => {
          const target = e.target;
          if (target && target.matches('a.nav-link')) {
            menu.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
          }
        });
      }

      const year = document.getElementById('year');
      if (year) year.textContent = String(new Date().getFullYear());
    })();
  </script>
</body>
</html>
