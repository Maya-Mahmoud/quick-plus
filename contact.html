<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Consultation Form</title>
  <meta name="description" content="Consultation form with validation and success message." />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container header-inner">
      
      <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
        <i class="theme-icon fas fa-moon" aria-hidden="true"></i>
      </button>

      <nav class="nav" aria-label="Primary">
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle navigation">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>

        <div class="nav-menu" id="nav-menu">
          <a class="nav-link" href="index.html">Portfolio</a>
          <a class="nav-link" href="blog.html">Blog</a>
          <a class="nav-link" href="shop.html">Product Gallery</a>
          <a class="nav-link" href="calculator.html">Calculator</a>
          <a class="nav-link active" href="contact.html">Consultation Form</a>
        </div>
      </nav>
    </div>
  </header>

  <main id="main" class="page">
    <section class="page-heading">
      <div class="container">
        <h1>Consultation Form</h1>
        <p class="lead">Tell us what you need. We’ll contact you with next steps.</p>
      </div>
    </section>

    <section class="container section">
      <div class=" work-card">
        <h2 class="section-title">Request a Consultation</h2>
        <p class="muted">Fields marked * are required.</p>

        <form id="consultForm" class="form" novalidate>
          <div class="grid-2">
            <label class="field">
              <span class="label"> Name *</span>
              <input class="inputcon" name="fullName" type="text" autocomplete="name" required placeholder="enter your full name" />
            </label>

            <label class="field">
              <span class="label">Phone *</span>
              <input name="phone" type="tel" inputmode="tel" autocomplete="tel" required placeholder=" +963xxxxxxxx" />
            </label>
          </div>

          <div class="grid-2">
            <label class="field">
              <span class="label">Email *</span>
              <input name="email" type="email" autocomplete="email" required placeholder="name@example.com" />
            </label>

            <label class="field">
              <span class="label" style="display:none;">Project Type</span>
              <select name="projectType" style="display:none;">
                <option value="">Choose...</option>
                <option>Website</option>
                <option>Web App</option>
                <option>E-commerce</option>
                <option>UI/UX Design</option>
                <option>Other</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span class="label">Message *</span>
            <textarea name="message" required rows="5" placeholder="Describe your goals and timeline..."></textarea>
          </label>

          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Send Request</button>
            <button class="btn btn-ghost" type="reset">Reset</button>
          </div>

          <p id="formStatus" class="status" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer"></footer>

  <script>
    (function () {
      const btn = document.querySelector('.theme-toggle');
      const icon = btn.querySelector('.theme-icon');
      
      // تهيئة الثيم عند تحميل الصفحة
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.classList.add('theme-dark');
        icon.classList.replace('fa-moon', 'fa-sun');
      }

      // منطق تبديل الثيم
      btn.addEventListener('click', () => {
        const isDark = document.documentElement.classList.toggle('theme-dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
      });

      // Navbar toggle
      const toggle = document.querySelector('.nav-toggle');
      const menu = document.querySelector('#nav-menu');
      if (toggle && menu) {
        toggle.addEventListener('click', () => {
          const expanded = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', String(!expanded));
          menu.classList.toggle('open');
        });
        menu.addEventListener('click', (e) => {
          if (e.target && e.target.matches('a.nav-link')) {
            menu.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
          }
        });
      }

      // Form handling
      const form = document.getElementById('consultForm');
      const statusEl = document.getElementById('formStatus');
      if (!form || !statusEl) return;

      function setStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = 'status ' + (type || '');
      }

      form.addEventListener('input', () => {
        statusEl.textContent = '';
      });

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const fullName = String(fd.get('fullName') || '').trim();
        const phone = String(fd.get('phone') || '').trim();
        const email = String(fd.get('email') || '').trim();
        const message = String(fd.get('message') || '').trim();

        if (!fullName || !phone || !email || !message) {
          setStatus('Please fill all required fields (*)', 'error');
          return;
        }

        const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        if (!emailOk) {
          setStatus('Please enter a valid email address.', 'error');
          return;
        }

        setStatus('Request sent! We will contact you soon.', 'success');
        form.reset();
      });
    })();
  </script>
</body>
</html>
